mode: rule
mixed-port: 7897
allow-lan: false
log-level: error
ipv6: false
unified-delay: false
tcp-concurrent: false
find-process-mode: strict

dns:
  default-nameserver:
  - 77.88.8.8
  - system
  direct-nameserver-follow-policy: false
  enable: true
  enhanced-mode: fake-ip # redir-host  or fake-ip
  fake-ip-filter:
    # Системные проверки (Captive Portal)
    - 'connectivitycheck.gstatic.com'
    - 'connectivitycheck.android.com'
    - 'msftconnecttest.com'
    - 'msftncsi.com'
    - 'captive.apple.com'
    - 'localhost.pt'
    # Локальная сеть и твои домены
    - '+.lan'
    - '+.local'
    - '+.direct'
    - '+.home.arpa'
    - 'polons.synology.me'
    - 'evpolondacha.keenetic.link'
    - 'evpolondom.keenetic.name'
    - '*.keenetic.link'
    - '*.keenetic.name'
    # Российский сегмент (для банков и госуслуг)
    - '+.ru'
    - '+.su'
    - '+.xn--p1ai'
  fake-ip-filter-mode: blacklist
  fake-ip-range: 198.18.0.1/16
  listen: :53
  ipv6: false
  nameserver:
  - https://dns.nextdns.io/6fe67c/Mihomo-cl
  prefer-h3: false
  proxy-server-nameserver:
  - https://dns.nextdns.io/6fe67c/Mihomo-cl
  respect-rules: true
  use-hosts: false
  use-system-hosts: false
profile:
  store-selected: true
  store-fake-ip: true
  
tun:
  enable: true
  stack: system
  mtu: 1500
  auto-route: true
  strict-route: true
  gso: false
  # gso-max-size: 65536
  udp-timeout: 300
  iproute2-table-index: 2022
  iproute2-rule-index: 9000
  endpoint-independent-nat: false
  auto-detect-interface: true
  dns-hijack:
  - any:53
  - tcp://any:53
  device: utun11
  route-exclude-address:
  - 0.0.0.0/8
  - 100.64.0.0/10
  - 127.0.0.0/8
  - 169.254.0.0/16
  - 172.16.0.0/12
  - 192.0.0.0/24
  - 192.0.2.0/24
  - 192.88.99.0/24
  - 192.168.0.0/16
  - 198.51.100.0/24
  - 203.0.113.0/24
  - 224.0.0.0/4
  - 255.255.255.255/32
  - 239.255.255.250/32

#  TCP keep alive interval
#  15  для компьютера
#  1800 для телефона, увеличение интервала экономит батарею 
keep-alive-interval: 10
keep-alive-idle: 10
#disable-keep-alive: true

sniffer:
  enable: false

