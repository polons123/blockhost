mode: rule
mixed-port: 7897
allow-lan: true
log-level: error
ipv6: false
external-controller: 0.0.0.0:59095
secret: 'Na.pole.tanki'
external-ui: ./ui
external-ui-url: "https://github.com/Zephyruso/zashboard/releases/latest/download/dist.zip"
external-controller-cors:
  allow-private-network: true
  allow-origins:
  - '*'
unified-delay: true
tcp-concurrent: true
find-process-mode: strict

dns:
  default-nameserver:
  - 185.222.222.222
  - 8.8.8.8
  direct-nameserver-follow-policy: false
  enable: true
  enhanced-mode: redir-host # redir-host  or fake-ip
  fake-ip-filter:
    # Системные проверки (Captive Portal)
    - 'connectivitycheck.gstatic.com'
    - 'connectivitycheck.android.com'
    - 'msftconnecttest.com'
    - 'msftncsi.com'
    - 'captive.apple.com'
    - 'localhost.pt'
    # Локальная сеть и твои домены
    - '+.lan'
    - '+.local'
    - '+.direct'
    - '+.home.arpa'
    - 'polons.synology.me'
    - 'evpolondacha.keenetic.link'
    - 'evpolondom.keenetic.name'
    - '*.keenetic.link'
    - '*.keenetic.name'
    # Российский сегмент (для банков и госуслуг)
    - '+.ru'
    - '+.su'
    - '+.xn--p1ai'
  fake-ip-filter-mode: blacklist
  fake-ip-range: 198.18.0.1/16
  listen: :53
  ipv6: false
  nameserver:
  - https://dns.nextdns.io/6fe67c/Mihomo-cl
  prefer-h3: false
  proxy-server-nameserver:
  - https://dns.nextdns.io/6fe67c/Mihomo-cl
  respect-rules: true
  use-hosts: false
  use-system-hosts: false
profile:
  store-selected: true
  store-fake-ip: true

tun:
  enable: true
  stack: system
  mtu: 1500
  auto-route: true
  strict-route: true
  gso: false
  # gso-max-size: 65536
  udp-timeout: 300
  iproute2-table-index: 2022
  iproute2-rule-index: 9000
  endpoint-independent-nat: false
  auto-detect-interface: true
  dns-hijack:
  - any:53
  - tcp://any:53
  device: utun11
  route-exclude-address:
  - 0.0.0.0/8
  - 100.64.0.0/10
  - 127.0.0.0/8
  - 169.254.0.0/16
  - 172.16.0.0/12
  - 192.0.0.0/24
  - 192.0.2.0/24
  - 192.88.99.0/24
  - 192.168.0.0/16
  - 198.51.100.0/24
  - 203.0.113.0/24
  - 224.0.0.0/4
  - 255.255.255.255/32
  - 239.255.255.250/32

#  TCP keep alive interval
#  15  для компьютера
#  1800 для телефона, увеличение интервала экономит батарею 
keep-alive-interval: 10
keep-alive-idle: 10
#disable-keep-alive: true

sniffer:
  enable: true
  force-dns-mapping: true
  parse-pure-ip: true
  override-destination: true
  sniff:
    QUIC:
      ports: [443, 8443]
      override-destination: true
    TLS:
      ports: [443, 8443]
      override-destination: true
    HTTP:
      ports: [80, 8080-8880]
      override-destination: true
  force-domain:
    - "+.google.com"
    - "+.youtube.com"
    - "+.googlevideo.com"
    - "+.ytimg.com"
    - "+.youtu.be"
    - "+.youtubei.googleapis.com"
    - "+.youtube-ui.l.google.com"
    - "+.yt.be"
    - "yt3.ggpht.com"
    - "yt3.googleusercontent.com"
    - "wide-youtube.l.google.com"
    - "ggpht.com"
    - "youtubeembeddedplayer.googleapis.com"
  skip-domain:
    # LAN домены - полностью переносим
    - '+.lan'
    - '+.localdomain'
    - '+.example'
    - '+.invalid'
    - '+.localhost'
    - '+.test'
    - '+.local'
    - '+.home.arpa'
    - '+.direct'
    
    # NTP сервисы - полностью переносим (UDP протокол)
    - 'time.*.com'
    - 'time.*.gov'
    - 'time.*.edu.cn'
    - 'time.*.apple.com'
    - 'time-ios.apple.com'
    - 'time1.*.com'
    - 'time2.*.com'
    - 'time3.*.com'
    - 'time4.*.com'
    - 'time5.*.com'
    - 'time6.*.com'
    - 'time7.*.com'
    - 'ntp.*.com'
    - 'ntp1.*.com'
    - 'ntp2.*.com'
    - 'ntp3.*.com'
    - 'ntp4.*.com'
    - 'ntp5.*.com'
    - 'ntp6.*.com'
    - 'ntp7.*.com'
    - '+.time.edu.cn'
    - '+.ntp.org.cn'
    - '+.pool.ntp.org'
    
    # STUN сервисы - полностью переносим (UDP протокол)
    - 'stun.*.*'
    - 'stun.*.*.*'
    - '+.stun.*.*'
    - '+.stun.*.*.*'
    - '+.stun.*.*.*.*'
    - '+.stun.*.*.*.*.*'
    
    # Push-уведомления и системные проверки
    - "+.push.apple.com"
    - "captive.apple.com"
    - "ocsp.apple.com"
    - "ocsp2.apple.com"
    - "mesu.apple.com"
    - "swscan.apple.com"
    - "swquery.apple.com"
    - "swdownload.apple.com"
    - "swcdn.apple.com"
    - "swdist.apple.com"
    - "configuration.apple.com"
    - "setup.icloud.com"
    - "p*.mail.icloud.com"
    - '+.fcm.googleapis.com'
    - '+.android.googleapis.com'
    - '+.msftconnecttest.com'
    - '+.msftncsi.com'
    - 'captive.apple.com'
    - 'detectportal.firefox.com'
    - '+.connectivitycheck.gstatic.com'
    - '+.ru'
        
